<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Sensor Hardware Health</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-container {
            width: 100%;
            max-width: 900px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 1.6rem;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-top: 5px;
            font-size: 0.95rem;
        }

        .canvas-wrapper {
            position: relative;
            height: 50vh; /* Keeps it responsive on your tablet */
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h2>Hardware Predictive Maintenance Analysis</h2>
            <p class="subtitle">Correlating Temp, Power Draw, and Cooling over 7 Days</p>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="multiSensorChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('multiSensorChart').getContext('2d');

        const multiSensorChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7'],
                datasets: [
                    {
                        label: 'Chipset Temp (°C)',
                        data: [45, 46, 48, 52, 59, 68, 82], // Notice the spike indicating failure
                        borderColor: '#e74c3c', // Red
                        backgroundColor: '#e74c3c',
                        borderWidth: 3,
                        yAxisID: 'y', // Links to the left axis
                        tension: 0.4
                    },
                    {
                        label: 'Power Draw (Watts)',
                        data: [15, 15.2, 15.5, 18, 22, 28, 35], 
                        borderColor: '#f39c12', // Orange
                        backgroundColor: '#f39c12',
                        borderDash: [5, 5], // Makes it a dashed line to distinguish it
                        borderWidth: 2,
                        yAxisID: 'y', // Also links to the left axis
                        tension: 0.4
                    },
                    {
                        label: 'Cooling Fan (RPM)',
                        data: [1200, 1250, 1300, 1800, 2400, 2900, 3100], 
                        borderColor: '#3498db', // Blue
                        backgroundColor: 'rgba(52, 152, 219, 0.2)',
                        borderWidth: 2,
                        fill: true,
                        yAxisID: 'y1', // Links to the RIGHT axis!
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false, // Tooltip shows all 3 sensor readings when you hover/tap anywhere on the vertical line
                },
                plugins: {
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleFont: { size: 14 },
                        bodyFont: { size: 13 },
                        padding: 12
                    },
                    legend: {
                        position: 'bottom',
                        labels: { padding: 20, usePointStyle: true }
                    }
                },
                scales: {
                    // The Left Axis (For Temp and Watts)
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: { display: true, text: 'Temp (°C) / Power (W)' },
                        grid: { color: '#ecf0f1' }
                    },
                    // The Right Axis (For RPM)
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        title: { display: true, text: 'Fan Speed (RPM)' },
                        grid: { drawOnChartArea: false }, // Hides the grid lines so they don't overlap with the left axis
                    }
                }
            }
        });
    </script>
</body>
</html>
